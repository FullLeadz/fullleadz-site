document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0 auto 26px; max-width:900px; color:#fff;\">On en discute pendant <span style=\"font-family:'Newsreader'; font-weight:400; font-style:italic; letter-spacing:-2px; color:#A99CFF;\">30 minutes<\u002Fspan>&nbsp;?<\u002Fh2>\n      <p style=\"font-size:19px; line-height:1.6; color:#A9A5C2; max-width:540px; margin:0 auto 40px;\">J'analyse ton process actuel, j'identifie tes meilleurs signaux d'intention, et tu repars avec un plan d'action. Même si tu ne signes pas.<\u002Fp>\n      <a href=\"https://cal.com/dorian-jamot/decouverte?utm_source=website\" target=\"_blank\" style=\"text-decoration:none; font-size:16px; font-weight:600; color:#fff; background:#6B4DFF; padding:18px 38px; border-radius:4px; box-shadow:0 16px 44px rgba(107,77,255,.4);\">Réserver mon créneau →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= FOOTER ================= -->\n  <div style=\"border-top:1px solid rgba(255,255,255,.1);\">\n    <div style=\"max-width:1300px; margin:0 auto; padding:28px 56px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px;\">\n      <span style=\"font-family:'Archivo'; font-weight:900; font-size:20px; letter-spacing:-1px; color:#fff;\">lead<span style=\"color:#6B4DFF;\">z<\u002Fspan>y<\u002Fspan>\n      <span style=\"font-weight:600; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5F688F;\">+5 ans d'expertise · Dorian Jamot<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: 0 };\n\n  componentDidMount() {\n    const start = () => {\n      const root = document.querySelector('[data-lz-root]');\n      if (!root) return;\n      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n      if (reduce) return;\n\n      // 1. Apparition au scroll des blocs de section\n      const blocks = Array.from(root.children).filter((el) => {\n        const pos = getComputedStyle(el).position;\n        return pos !== 'absolute' && pos !== 'fixed' && pos !== 'sticky';\n      });\n      blocks.forEach((el) => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(26px)';\n        el.style.transition = 'opacity 1.1s cubic-bezier(.16,1,.3,1), transform 1.1s cubic-bezier(.16,1,.3,1)';\n      });\n      const revealIO = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            revealIO.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      blocks.forEach((el) => revealIO.observe(el));\n\n      // 2. Compteurs animés\n      const easeOut = (t) => 1 - Math.pow(1 - t, 3);\n      const runCount = (el) => {\n        const target = parseInt(el.getAttribute('data-count'), 10) || 0;\n        const dur = 2400;\n        const t0 = performance.now();\n        const step = (now) => {\n          const p = Math.min(1, (now - t0) / dur);\n          el.textContent = Math.round(easeOut(p) * target);\n          if (p < 1) requestAnimationFrame(step);\n          else el.textContent = target;\n        };\n        requestAnimationFrame(step);\n      };\n      const countIO = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) { runCount(e.target); countIO.unobserve(e.target); }\n        });\n      }, { threshold: 0.6 });\n      root.querySelectorAll('[data-count]').forEach((el) => countIO.observe(el));\n\n      // 3. Barres de score\n      root.querySelectorAll('[data-fill]').forEach((el) => {\n        const target = el.getAttribute('data-fill') + '%';\n        el.style.width = '0%';\n        el.style.transition = 'width 1.7s cubic-bezier(.16,1,.3,1)';\n        el.dataset.target = target;\n      });\n      const fillIO = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            requestAnimationFrame(() => { e.target.style.width = e.target.dataset.target; });\n            fillIO.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.5 });\n      root.querySelectorAll('[data-fill]').forEach((el) => fillIO.observe(el));\n    };\n    requestAnimationFrame(() => requestAnimationFrame(start));\n  }\n\n  renderVals() {\n    const data = [\n      { q: \"C'est quoi un « signal d'intention » exactement ?\", a: \"C'est un événement observable qui indique qu'un prospect est potentiellement en phase d'achat : une levée de fonds, un recrutement sur un poste clé, l'adoption d'une techno concurrente, un changement de poste d'un décideur ou un engagement sur du contenu LinkedIn lié à ton sujet. Plutôt que de contacter tout le monde, on contacte seulement ceux qui montrent des signes d'intérêt, au bon moment.\" },\n      { q: \"Combien de temps avant les premiers résultats ?\", a: \"Les premières campagnes sont lancées entre la semaine 3 et la semaine 6, selon la complexité du setup. Les premières réponses arrivent généralement dans les jours qui suivent le lancement. L'objectif est 10 rendez-vous qualifiés sur les 2 premiers mois.\" },\n      { q: \"Et si je veux arrêter après le minimum ?\", a: \"Tu gardes tout. Le système, les workflows, le Notion documenté, les accès aux outils. Tout t'appartient. C'est l'avantage du modèle : tu ne loues pas un service, tu construis un actif. Les mois 4 et 5 sont là pour optimiser et te rendre complètement autonome, mais c'est ta décision.\" },\n      { q: \"Quels outils sont utilisés ?\", a: \"Le stack est adapté à chaque client, mais les briques classiques incluent Clay ou n8n pour l'automatisation et l'enrichissement, Smartlead ou Instantly pour l'envoi, LinkedIn Sales Navigator et un CRM comme Pipedrive ou HubSpot. Les coûts des outils sont à ta charge mais restent raisonnables, souvent entre 200 et 400€ par mois au total.\" },\n      { q: \"Je n'ai pas d'équipe commerciale, c'est un problème ?\", a: \"Non, la plupart de mes clients sont des fondateurs qui gèrent eux-mêmes la partie commerciale. Le système amène les rendez-vous, toi tu closes. Il faut juste être réactif quand un lead chaud arrive.\" }\n    ];\n    return {\n      faqs: data.map((f, i) => ({\n        num: String(i + 1).padStart(2, '0'),\n        q: f.q,\n        a: f.a,\n        isOpen: this.state.open === i,\n        sign: this.state.open === i ? '–' : '+',\n        toggle: () => this.setState({ open: this.state.open === i ? -1 : i })\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
